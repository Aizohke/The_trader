[build]
  base    = "client"
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy REST API calls to Render backend
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR-RENDER-APP.onrender.com/api/:splat"
  status = 200
  force  = true

[dev]
  command    = "npm start"
  port       = 3000
  targetPort = 3000
